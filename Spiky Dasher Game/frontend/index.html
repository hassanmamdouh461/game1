<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Spiky Dasher Game | @coding.stella</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <!-- Osmo Loading Animation -->
  <section class="willem-header is--loading">
     <div class="willem-loader">
        <div class="willem__h1">
           <div class="willem__h1-start">
              <span class="willem__letter">H</span>
              <span class="willem__letter">A</span>
              <span class="willem__letter">S</span>
           </div>
           <div class="willem-loader__box">
              <div class="willem-loader__box-inner">
                 <div class="willem__growing-image">
                    <div class="willem__growing-image-wrap">
                       <img class="willem__cover-image intro-slide" src="intro_1.png" style="opacity: 1;">
                       <img class="willem__cover-image intro-slide" src="intro_2.png" style="opacity: 0;">
                       <img class="willem__cover-image intro-slide" src="intro_3.png" style="opacity: 0;">
                       <img class="willem__cover-image intro-slide" src="intro_4.png" style="opacity: 0;">
                       <img class="willem__cover-image intro-slide" src="intro_5.png" style="opacity: 0;">
                    </div>
                 </div>
              </div>
           </div>
           <div class="willem__h1-end">
              <span class="willem__letter">S</span>
              <span class="willem__letter">A</span>
              <span class="willem__letter">N</span>
           </div>
        </div>
     </div>
     <div class="willem-header__content">
      <!-- Content removed to fix duplicate text issues -->
     </div>
  </section>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>

  <!-- arrow keys to move and jump -->
  <!-- also a double jump -->
  <div id="loading_screen" style="display: none;">
    <div class="intro-scene">
      <div class="intro-player"></div>
      <div class="intro-floor">
        <div class="intro-obstacle"></div>
        <div class="intro-obstacle" style="left: 300px"></div>
        <div class="intro-obstacle" style="left: 600px"></div>
      </div>
    </div>
    <h1 class="intro-text">SPIKY DASHER</h1>
    <button id="start_btn">START GAME</button>
    <p class="start-instructions">
      Arrow keys to move and jump<br>
      double jump / wall sliding
    </p>
  </div>
  <!-- Cutscene Screen (shown after last level) -->
  <div id="cutscene_screen" style="display: none;">
    <canvas id="cutscene_canvas"></canvas>
    <div class="cutscene-content">
      <div class="cutscene-lines">
        <p class="cutscene-line" id="cs_line1"></p>
        <p class="cutscene-line" id="cs_line2"></p>
        <p class="cutscene-line" id="cs_line3"></p>
        <p class="cutscene-line cs-stat" id="cs_line4" style="margin-top: 20px;"></p>
        <p class="cutscene-line cs-stat" id="cs_line5"></p>
      </div>

      <button class="cutscene-skip-btn" id="cutscene_skip">SKIP &rsaquo;</button>
    </div>
  </div>
  <div id="game_wrapper">
    <div id='deaths_counter'>DEATHS<br><span class="value">0</span></div>
    <div id='time_counter'>TIME<br><span class="value">00:00:00</span></div>
    <div id='game_console'>
    </div>
  </div>

  <!-- Pause Screen -->
  <div id="pause_screen" style="display: none;">
    <div class="pause-content">
      <h1 class="pause-title">PAUSED</h1>
      <p class="pause-hint">Press <kbd>P</kbd> or <kbd>ESC</kbd> to Resume</p>
      <p class="pause-hint">Press <kbd>R</kbd> to Restart</p>
    </div>
  </div>

  <!-- Mobile Touch Controls -->
  <div id="mobile_controls">
    <div class="mobile-controls-left">
      <button class="mobile-btn" id="btn_left" aria-label="Move Left">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <button class="mobile-btn" id="btn_right" aria-label="Move Right">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
    <div class="mobile-controls-right">
      <button class="mobile-btn mobile-btn-jump" id="btn_jump" aria-label="Jump">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
      </button>
    </div>
  </div>

  <!-- Device Orientation Overlay -->
  <div id="portrait_overlay">
    <div class="phone-icon-container">
      <svg class="phone-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="5" y="2" width="14" height="20" rx="2" ry="2"/>
        <line x1="12" y1="18" x2="12.01" y2="18"/>
      </svg>
      <svg class="arrow-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.0" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/>
      </svg>
    </div>
    <h2>ROTATE YOUR DEVICE</h2>
    <p>Please rotate your device to landscape mode for the best gaming experience.</p>
  </div>

  <script src="script.js"></script>

</body>
</html>
